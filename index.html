<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GymTrack</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d0d0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GymTrack">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0f;
    --surface: #161618;
    --card: #1e1e22;
    --border: #2a2a30;
    --accent: #e8ff47;
    --accent2: #ff4747;
    --text: #f0f0f0;
    --muted: #888;
    --green: #47ffb0;
    --orange: #ff9a3c;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* NAV */
  nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px;
    letter-spacing: 2px;
    color: var(--accent);
  }
  .logo span { color: var(--text); }
  .nav-tabs { display: flex; gap: 4px; }
  .nav-tab {
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
    border: none;
    background: transparent;
    transition: all 0.2s;
  }
  .nav-tab.active, .nav-tab:hover {
    background: var(--card);
    color: var(--text);
  }
  .nav-tab.active { color: var(--accent); }

  /* VIEWS */
  .view { display: none; padding: 24px; max-width: 900px; margin: 0 auto; }
  .view.active { display: block; }

  /* DAY SELECTOR */
  .day-selector {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .day-btn {
    padding: 10px 20px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--muted);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    transition: all 0.2s;
  }
  .day-btn:hover { border-color: var(--accent); color: var(--text); }
  .day-btn.active {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
    font-weight: 600;
  }
  .day-label {
    font-size: 11px;
    display: block;
    opacity: 0.7;
    margin-top: 2px;
  }

  /* SESSION HEADER */
  .session-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 12px;
  }
  .session-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    letter-spacing: 1px;
  }
  .session-title span { color: var(--accent); }
  .log-btn {
    padding: 12px 24px;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .log-btn:hover { background: #d4eb35; transform: translateY(-1px); }

  /* EXERCISE CARDS */
  .exercise-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    margin-bottom: 12px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .exercise-card:hover { border-color: #3a3a45; }
  .exercise-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    cursor: pointer;
  }
  .exercise-name {
    font-weight: 600;
    font-size: 15px;
  }
  .exercise-meta {
    display: flex;
    gap: 12px;
    align-items: center;
  }
  .target-badge {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 12px;
    color: var(--muted);
  }
  .target-badge b { color: var(--accent); }
  .chevron {
    color: var(--muted);
    font-size: 12px;
    transition: transform 0.2s;
  }
  .exercise-card.open .chevron { transform: rotate(180deg); }

  /* SET LOGGER */
  .set-logger {
    display: none;
    padding: 0 20px 20px;
    border-top: 1px solid var(--border);
  }
  .exercise-card.open .set-logger { display: block; }
  .set-row-header {
    display: grid;
    grid-template-columns: 40px 1fr 1fr 1fr 80px;
    gap: 8px;
    padding: 10px 0 6px;
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .set-row {
    display: grid;
    grid-template-columns: 40px 1fr 1fr 1fr 80px;
    gap: 8px;
    margin-bottom: 8px;
    align-items: center;
  }
  .set-num {
    font-size: 12px;
    color: var(--muted);
    font-weight: 600;
    text-align: center;
    background: var(--surface);
    border-radius: 6px;
    padding: 8px 0;
  }
  .set-input {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    width: 100%;
    text-align: center;
    transition: border-color 0.2s;
  }
  .set-input:focus { outline: none; border-color: var(--accent); }
  .set-done-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    cursor: pointer;
    font-size: 18px;
    padding: 8px;
    transition: all 0.2s;
    width: 100%;
  }
  .set-done-btn:hover, .set-done-btn.done {
    background: var(--green);
    color: #000;
    border-color: var(--green);
  }
  .add-set-btn {
    margin-top: 8px;
    padding: 8px 16px;
    background: transparent;
    border: 1px dashed var(--border);
    border-radius: 8px;
    color: var(--muted);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    width: 100%;
    transition: all 0.2s;
  }
  .add-set-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* PROGRESS BAR */
  .progress-bar-wrap {
    background: var(--surface);
    border-radius: 20px;
    height: 4px;
    margin-bottom: 20px;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    background: var(--accent);
    border-radius: 20px;
    transition: width 0.4s ease;
  }
  .progress-label {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 6px;
  }

  /* HISTORY VIEW */
  .history-empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .history-empty .icon { font-size: 40px; margin-bottom: 12px; }
  .session-log {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    margin-bottom: 16px;
    overflow: hidden;
  }
  .session-log-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    cursor: pointer;
  }
  .session-log-date { font-weight: 600; font-size: 15px; }
  .session-log-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .session-log-body { display: none; padding: 0 20px 20px; border-top: 1px solid var(--border); }
  .session-log.open .session-log-body { display: block; }
  .log-exercise-name {
    font-size: 13px;
    font-weight: 600;
    margin: 14px 0 6px;
    color: var(--accent);
  }
  .log-set-row {
    display: flex;
    gap: 16px;
    font-size: 13px;
    color: var(--muted);
    padding: 4px 0;
  }
  .log-set-row b { color: var(--text); }

  /* PROGRESS VIEW */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }
  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
  }
  .stat-label { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  .stat-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    letter-spacing: 1px;
    color: var(--accent);
    line-height: 1;
  }
  .stat-sub { font-size: 12px; color: var(--muted); margin-top: 4px; }

  .exercise-progress-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    margin-bottom: 12px;
  }
  .ep-name { font-weight: 600; margin-bottom: 12px; }
  .ep-graph {
    display: flex;
    align-items: flex-end;
    gap: 4px;
    height: 60px;
    margin-bottom: 8px;
  }
  .ep-bar-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    height: 100%;
    justify-content: flex-end;
  }
  .ep-bar {
    width: 100%;
    background: var(--accent);
    border-radius: 4px 4px 0 0;
    min-height: 4px;
    transition: height 0.4s ease;
    opacity: 0.85;
  }
  .ep-bar-label {
    font-size: 9px;
    color: var(--muted);
    margin-top: 4px;
    text-align: center;
  }
  .ep-trend {
    font-size: 12px;
    color: var(--muted);
  }
  .ep-trend .up { color: var(--green); }
  .ep-trend .down { color: var(--accent2); }

  /* SAVE BANNER */
  .save-banner {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--green);
    color: #000;
    font-weight: 600;
    font-size: 14px;
    padding: 14px 28px;
    border-radius: 12px;
    transition: transform 0.3s ease;
    z-index: 999;
    white-space: nowrap;
  }
  .save-banner.show { transform: translateX(-50%) translateY(0); }

  /* EXPORT BTN */
  .export-btn {
    padding: 10px 20px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .export-btn:hover { border-color: var(--accent); color: var(--accent); }
  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 1px;
    margin-bottom: 16px;
    color: var(--muted);
  }

  /* MUSCLE MAP */
  .muscle-map-wrap {
    display: flex;
    gap: 16px;
    padding: 16px 0 10px;
    align-items: flex-start;
    border-bottom: 1px solid var(--border);
    margin-bottom: 14px;
  }
  .muscle-map-bodies {
    display: flex;
    gap: 8px;
    flex-shrink: 0;
  }
  .muscle-map-bodies svg { width: 110px; }
  .muscle-map-label {
    font-size: 10px;
    color: var(--muted);
    text-align: center;
    margin-top: 4px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .muscle-legend {
    display: flex;
    flex-direction: column;
    gap: 8px;
    justify-content: center;
    padding-top: 4px;
  }
  .legend-section-title {
    font-size: 10px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 2px;
  }
  .legend-row { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text); }
  .legend-dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }
  .legend-dot.primary   { background: #e8263a; }
  .legend-dot.secondary { background: #f07d20; }

  /* GYM MODE TOGGLE */
  .gym-mode-toggle {
    display: flex;
    align-items: center;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 3px;
    gap: 2px;
    margin-bottom: 16px;
  }
  .gym-mode-btn {
    flex: 1;
    padding: 8px 14px;
    border-radius: 8px;
    border: none;
    background: transparent;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .gym-mode-btn.active {
    background: var(--card);
    color: var(--text);
  }
  .gym-mode-btn.hotel.active {
    background: #1a3a2a;
    color: #47ffb0;
    border: 1px solid #1e5a3a;
  }
  .hotel-badge {
    display: inline-block;
    background: #1a3a2a;
    color: #47ffb0;
    font-size: 10px;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 4px;
    letter-spacing: 0.5px;
  }

  .wiki-btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 5px 10px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 500;
    cursor: pointer;
    text-decoration: none;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .wiki-btn:hover { border-color: var(--accent); color: var(--accent); }

  @media (max-width: 600px) {
    .set-row-header, .set-row { grid-template-columns: 32px 1fr 1fr 1fr 50px; }
    .session-title { font-size: 24px; }
    .muscle-map-bodies svg { width: 80px; }
  }
</style>
</head>
<body>

<nav>
  <div class="logo">GYM<span>TRACK</span></div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showView('workout')">Workout</button>
    <button class="nav-tab" onclick="showView('history')">History</button>
    <button class="nav-tab" onclick="showView('progress')">Progress</button>
  </div>
</nav>

<!-- WORKOUT VIEW -->
<div class="view active" id="view-workout">
  <div class="gym-mode-toggle">
    <button class="gym-mode-btn active" id="btn-fullgym" onclick="setGymMode('full')">🏋️ Full Gym</button>
    <button class="gym-mode-btn hotel" id="btn-hotel" onclick="setGymMode('hotel')">🏨 Hotel Gym</button>
  </div>
  <div class="day-selector" id="daySelector"></div>
  <div id="progressWrap">
    <div class="progress-label" id="progressLabel">0 / 0 sets completed</div>
    <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
  </div>
  <div class="session-header">
    <div class="session-title" id="sessionTitle">PULL <span>1</span></div>
    <button class="log-btn" onclick="saveSession()">✓ Save Session</button>
  </div>
  <div id="exerciseList"></div>
</div>

<!-- HISTORY VIEW -->
<div class="view" id="view-history">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px;">
    <h2 class="section-title" style="margin:0">SESSION HISTORY</h2>
    <button class="export-btn" onclick="exportCSV()">⬇ Export CSV</button>
  </div>
  <div id="historyList"></div>
</div>

<!-- PROGRESS VIEW -->
<div class="view" id="view-progress">
  <h2 class="section-title">PROGRESS OVERVIEW</h2>
  <div class="stats-grid" id="statsGrid"></div>
  <h2 class="section-title">EXERCISE HISTORY</h2>
  <div id="progressList"></div>
</div>

<div class="save-banner" id="saveBanner">Session saved! 💪</div>

<script>
// ─── MUSCLE MAP ─────────────────────────────────────────────────────────────
// Each exercise maps to { primary: [...], secondary: [...] }
// Muscle IDs match SVG path IDs in the body diagrams
const MUSCLES = {
  "Deadlifts":         { primary: ["hamstrings","glutes","erector"], secondary: ["traps","lats","quads","forearms"] },
  "Barbell Curl":      { primary: ["biceps"], secondary: ["forearms","front-delt"] },
  "Bent-over Row":     { primary: ["lats","mid-back"], secondary: ["biceps","rear-delt","traps"] },
  "Reverse Cable Fly": { primary: ["rear-delt","mid-back"], secondary: ["traps"] },
  "Upright Row":       { primary: ["traps","front-delt"], secondary: ["biceps","mid-delt"] },
  "Inverted Row":      { primary: ["lats","mid-back"], secondary: ["biceps","rear-delt"] },
  "Battle Ropes":      { primary: ["front-delt","triceps"], secondary: ["biceps","core","traps"] },
  "Dumbbell Squat":    { primary: ["quads","glutes"], secondary: ["hamstrings","core"] },
  "Chest Press":       { primary: ["chest"], secondary: ["triceps","front-delt"] },
  "Incline Press":     { primary: ["upper-chest","front-delt"], secondary: ["triceps"] },
  "Dips":              { primary: ["chest","triceps"], secondary: ["front-delt"] },
  "Fly DAP":           { primary: ["chest"], secondary: ["front-delt","biceps"] },
  "Push Up Row":       { primary: ["chest","lats"], secondary: ["triceps","biceps","core"] },
  "Push Up":           { primary: ["chest","triceps"], secondary: ["front-delt","core"] },
  "Low Pulley":        { primary: ["lats","mid-back"], secondary: ["biceps","rear-delt"] },
  "Lat Pull Down":     { primary: ["lats"], secondary: ["biceps","rear-delt","traps"] },
  "Pull Ups":          { primary: ["lats"], secondary: ["biceps","mid-back","rear-delt"] },
  "Face Pull Rope":    { primary: ["rear-delt","mid-back"], secondary: ["traps","biceps"] },
  "Hammer Curls":      { primary: ["biceps","forearms"], secondary: ["front-delt"] },
  "Serratus Crunch":   { primary: ["serratus","core"], secondary: ["chest"] },
  "Decline Bench":     { primary: ["chest","triceps"], secondary: ["front-delt"] },
  "Skull Crusher":     { primary: ["triceps"], secondary: [] },
  "O.H. Fr Press":     { primary: ["front-delt","triceps"], secondary: ["mid-delt","traps"] },
  "Cable Laterals":    { primary: ["mid-delt"], secondary: ["front-delt","traps"] },
  "Tricep Rope P.D.":  { primary: ["triceps"], secondary: [] },
  "Sledge Push":       { primary: ["chest","triceps","quads"], secondary: ["glutes","core","front-delt"] },
  "Ball Slams":        { primary: ["core","front-delt"], secondary: ["traps","lats","hamstrings"] },
  "Plank":             { primary: ["core"], secondary: ["glutes","serratus"] },
  // Hotel gym exercises
  "DB Romanian Deadlift":   { primary: ["hamstrings","glutes"], secondary: ["erector","forearms"] },
  "DB Curl":                { primary: ["biceps"], secondary: ["forearms","front-delt"] },
  "DB Bent-over Row":       { primary: ["lats","mid-back"], secondary: ["biceps","rear-delt","traps"] },
  "DB Reverse Fly":         { primary: ["rear-delt","mid-back"], secondary: ["traps"] },
  "DB Upright Row":         { primary: ["traps","front-delt"], secondary: ["biceps","mid-delt"] },
  "Towel Face Pull":        { primary: ["rear-delt","mid-back"], secondary: ["traps","biceps"] },
  "DB Goblet Squat":        { primary: ["quads","glutes"], secondary: ["hamstrings","core"] },
  "DB Bench Press":         { primary: ["chest"], secondary: ["triceps","front-delt"] },
  "DB Incline Press":       { primary: ["upper-chest","front-delt"], secondary: ["triceps"] },
  "DB Chest Fly":           { primary: ["chest"], secondary: ["front-delt","biceps"] },
  "DB Lateral Raise":       { primary: ["mid-delt"], secondary: ["front-delt","traps"] },
  "DB Overhead Press":      { primary: ["front-delt","mid-delt"], secondary: ["triceps","traps"] },
  "DB Single Arm Row":      { primary: ["lats","mid-back"], secondary: ["biceps","rear-delt"] },
  "DB Hammer Curl":         { primary: ["biceps","forearms"], secondary: ["front-delt"] },
  "Pull Up":                { primary: ["lats"], secondary: ["biceps","mid-back","rear-delt"] },
  "DB Shrug":               { primary: ["traps"], secondary: ["forearms"] },
  "DB Sumo Squat":          { primary: ["quads","glutes"], secondary: ["hamstrings","core"] },
  "DB Tricep Kickback":     { primary: ["triceps"], secondary: [] },
  "DB Overhead Tricep Ext": { primary: ["triceps"], secondary: ["front-delt"] },
  "DB Front Raise":         { primary: ["front-delt"], secondary: ["mid-delt","traps"] },
  "Diamond Push Up":        { primary: ["triceps","chest"], secondary: ["front-delt","core"] },
};

// Muscle ID → fill colour helper
function muscleColor(id, primary, secondary) {
  if (primary.includes(id)) return '#e8263a';
  if (secondary.includes(id)) return '#f07d20';
  return null;
}

function buildBodySVG(exName) {
  const map = MUSCLES[exName] || { primary: [], secondary: [] };
  const p = map.primary, s = map.secondary;
  const OFF  = '#3a3a48';   // inactive muscle — visible dark grey
  const BODY = '#252530';   // body base
  const STRK = '#4a4a5a';   // outline stroke
  const c = id => muscleColor(id, p, s) || OFF;

  const front = `<svg viewBox="0 0 120 260" xmlns="http://www.w3.org/2000/svg">
  <!-- body base -->

function buildMuscleLegend(exName) {
  const map = MUSCLES[exName] || { primary: [], secondary: [] };
  const fmt = id => id.replace(/-/g,' ').replace(/\b\w/g, c => c.toUpperCase());
  let html = '';
  if (map.primary.length) {
    html += `<div class="legend-section-title">Primary</div>`;
    html += map.primary.map(m => `<div class="legend-row"><div class="legend-dot primary"></div>${fmt(m)}</div>`).join('');
  }
  if (map.secondary.length) {
    html += `<div class="legend-section-title" style="margin-top:6px">Secondary</div>`;
    html += map.secondary.map(m => `<div class="legend-row"><div class="legend-dot secondary"></div>${fmt(m)}</div>`).join('');
  }
  return html;
}

}

function activeProgram() {
  return gymMode === 'hotel' ? HOTEL_PROGRAM : PROGRAM;
}

function activeWikiUrls() {
  return gymMode === 'hotel' ? HOTEL_MUSCLEWIKI : MUSCLEWIKI;
}

const DAYS = ["Day 1", "Day 2", "Day 3", "Day 4"];
let currentDay = "Day 1";
let sessions = JSON.parse(localStorage.getItem('gymSessions') || '[]');
let setData = {}; // { dayName: { exerciseName: [ {weight, reps, done}, ... ] } }

// ─── INIT ────────────────────────────────────────────────────────────────────
function init() {
  buildDaySelector();
  renderWorkout(currentDay);
  renderHistory();
  renderProgress();
}

function buildDaySelector() {
  const el = document.getElementById('daySelector');
  el.innerHTML = DAYS.map(d => `
    <button class="day-btn ${d===currentDay?'active':''}" onclick="switchDay('${d}')">
      ${d}
      <span class="day-label">${PROGRAM[d].label}</span>
    </button>
  `).join('');
}

function switchDay(day) {
  currentDay = day;
  buildDaySelector();
  renderWorkout(day);
}

// ─── WORKOUT RENDER ──────────────────────────────────────────────────────────
function getSetData(day, exName, numSets, defaultReps, defaultWeight) {
  if (!setData[day]) setData[day] = {};
  if (!setData[day][exName]) {
    setData[day][exName] = Array.from({length: numSets}, () => ({
      weight: defaultWeight, reps: defaultReps, done: false
    }));
  }
  return setData[day][exName];
}

function renderWorkout(day) {
  const prog = activeProgram()[day];
  const wikiUrls = activeWikiUrls();
  document.getElementById('sessionTitle').innerHTML =
    `${prog.label.replace(/(\d)/, '<span>$1</span>')}${gymMode === 'hotel' ? ' &nbsp;<span class="hotel-badge">HOTEL</span>' : ''}`;
  const list = document.getElementById('exerciseList');
  list.innerHTML = prog.exercises.map((ex, ei) => {
    const sets = getSetData(day, ex.name, ex.defaultSets, ex.defaultReps, ex.defaultWeight);
    const typeLabel = ex.type === 'W' ? 'Weighted' : 'Bodyweight';
    return `
    <div class="exercise-card" id="ecard-${ei}">
      <div class="exercise-header" onclick="toggleCard(${ei})">
        <div>
          <div class="exercise-name">${ex.name}</div>
        </div>
        <div class="exercise-meta">
          <div class="target-badge">Target: <b>${ex.target.weight > 0 ? ex.target.weight+'kg' : 'BW'}</b> × <b>${ex.target.reps}</b></div>
          <div class="target-badge">${typeLabel}</div>
          ${wikiUrls[ex.name] ? `<a class="wiki-btn" href="${wikiUrls[ex.name]}" target="_blank" onclick="event.stopPropagation()">▶ Demo</a>` : ''}
          <span class="chevron">▼</span>
        </div>
      </div>
      <div class="set-logger">
        <div class="muscle-map-wrap">
          <div class="muscle-map-bodies">
            <div>
              ${buildBodySVG(ex.name).front}
              <div class="muscle-map-label">Front</div>
            </div>
            <div>
              ${buildBodySVG(ex.name).back}
              <div class="muscle-map-label">Back</div>
            </div>
          </div>
          <div class="muscle-legend">${buildMuscleLegend(ex.name)}</div>
        </div>
        <div class="set-row-header">
          <div>SET</div><div>WEIGHT (kg)</div><div>REPS</div><div>RPE</div><div>DONE</div>
        </div>
        ${sets.map((s, si) => `
          <div class="set-row" id="setrow-${ei}-${si}">
            <div class="set-num">${si+1}</div>
            <input class="set-input" type="number" value="${s.weight}" step="0.5"
              onchange="updateSet('${day}','${ex.name}',${si},'weight',this.value)" placeholder="kg">
            <input class="set-input" type="number" value="${s.reps}"
              onchange="updateSet('${day}','${ex.name}',${si},'reps',this.value)" placeholder="reps">
            <input class="set-input" type="number" min="1" max="10" placeholder="RPE"
              onchange="updateSet('${day}','${ex.name}',${si},'rpe',this.value)">
            <button class="set-done-btn ${s.done?'done':''}" onclick="toggleSetDone(${ei},${si},'${day}','${ex.name}')">
              ${s.done ? '✓' : '○'}
            </button>
          </div>
        `).join('')}
        <button class="add-set-btn" onclick="addSet(${ei},'${day}','${ex.name}',${ex.defaultReps},${ex.defaultWeight})">
          + Add Set
        </button>
      </div>
    </div>
    `;
  }).join('');
  updateProgress();
}

function toggleCard(ei) {
  const card = document.getElementById(`ecard-${ei}`);
  card.classList.toggle('open');
}

function updateSet(day, exName, si, field, value) {
  if (!setData[day]?.[exName]) return;
  setData[day][exName][si][field] = field === 'rpe' ? parseInt(value) : parseFloat(value);
}

function toggleSetDone(ei, si, day, exName) {
  const sets = setData[day]?.[exName];
  if (!sets) return;
  sets[si].done = !sets[si].done;
  const btn = document.querySelector(`#setrow-${ei}-${si} .set-done-btn`);
  if (btn) {
    btn.classList.toggle('done', sets[si].done);
    btn.textContent = sets[si].done ? '✓' : '○';
  }
  updateProgress();
}

function addSet(ei, day, exName, defaultReps, defaultWeight) {
  if (!setData[day]) setData[day] = {};
  if (!setData[day][exName]) setData[day][exName] = [];
  setData[day][exName].push({ weight: defaultWeight, reps: defaultReps, done: false });
  renderWorkout(day);
  // Re-open the card
  const card = document.getElementById(`ecard-${ei}`);
  if (card) card.classList.add('open');
}

function updateProgress() {
  const prog = activeProgram()[currentDay];
  let total = 0, done = 0;
  prog.exercises.forEach(ex => {
    const sets = setData[currentDay]?.[ex.name] || [];
    total += sets.length;
    done += sets.filter(s => s.done).length;
  });
  const pct = total > 0 ? Math.round(done / total * 100) : 0;
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `${done} / ${total} sets completed`;
}

// ─── SAVE SESSION ────────────────────────────────────────────────────────────
function saveSession() {
  const day = currentDay;
  const prog = activeProgram()[day];
  const now = new Date();
  const exercises = prog.exercises.map(ex => ({
    name: ex.name,
    sets: (setData[day]?.[ex.name] || []).map(s => ({ ...s }))
  })).filter(ex => ex.sets.some(s => s.done));

  if (exercises.length === 0) {
    alert('Please complete at least one set before saving!');
    return;
  }

  const session = {
    id: Date.now(),
    date: now.toLocaleDateString('en-GB', { weekday:'long', year:'numeric', month:'long', day:'numeric' }),
    dateISO: now.toISOString(),
    day: day,
    label: prog.label,
    mode: gymMode,
    exercises
  };
  sessions.unshift(session);
  localStorage.setItem('gymSessions', JSON.stringify(sessions));

  // Reset
  delete setData[day];
  renderWorkout(day);
  renderHistory();
  renderProgress();

  const banner = document.getElementById('saveBanner');
  banner.classList.add('show');
  setTimeout(() => banner.classList.remove('show'), 2500);
}

// ─── HISTORY ─────────────────────────────────────────────────────────────────
function renderHistory() {
  const el = document.getElementById('historyList');
  if (sessions.length === 0) {
    el.innerHTML = `<div class="history-empty"><div class="icon">🏋️</div><p>No sessions logged yet.<br>Complete a workout and hit Save Session!</p></div>`;
    return;
  }
  el.innerHTML = sessions.map((s, i) => {
    const totalSets = s.exercises.reduce((acc, ex) => acc + ex.sets.length, 0);
    const exNames = s.exercises.map(e => e.name).slice(0,3).join(', ') + (s.exercises.length > 3 ? '...' : '');
    return `
    <div class="session-log" id="slog-${i}">
      <div class="session-log-header" onclick="toggleSessionLog(${i})">
        <div>
          <div class="session-log-date">${s.date}</div>
          <div class="session-log-meta">${s.label}${s.mode==='hotel' ? ' <span class="hotel-badge">HOTEL</span>' : ''} · ${totalSets} sets · ${exNames}</div>
        </div>
        <span class="chevron">▼</span>
      </div>
      <div class="session-log-body">
        ${s.exercises.map(ex => `
          <div class="log-exercise-name">${ex.name}</div>
          ${ex.sets.map((set, si) => `
            <div class="log-set-row">
              <span>Set ${si+1}</span>
              <span><b>${set.weight > 0 ? set.weight+'kg' : 'BW'}</b></span>
              <span><b>${set.reps}</b> reps</span>
              ${set.rpe ? `<span>RPE <b>${set.rpe}</b></span>` : ''}
            </div>
          `).join('')}
        `).join('')}
      </div>
    </div>`;
  }).join('');
}

function toggleSessionLog(i) {
  document.getElementById(`slog-${i}`)?.classList.toggle('open');
}

// ─── PROGRESS ────────────────────────────────────────────────────────────────
function renderProgress() {
  // Stats
  const totalSessions = sessions.length;
  const totalSets = sessions.reduce((acc, s) => acc + s.exercises.reduce((a, ex) => a + ex.sets.length, 0), 0);
  const days = new Set(sessions.map(s => s.day)).size;
  const lastSession = sessions[0]?.date?.split(',')[0] || '-';

  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-card">
      <div class="stat-label">Total Sessions</div>
      <div class="stat-value">${totalSessions}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Total Sets Logged</div>
      <div class="stat-value">${totalSets}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Days Trained</div>
      <div class="stat-value">${days}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Last Session</div>
      <div class="stat-value" style="font-size:20px;padding-top:8px">${lastSession}</div>
    </div>
  `;

  // Per-exercise progress
  const exMap = {};
  sessions.forEach(s => {
    s.exercises.forEach(ex => {
      if (!exMap[ex.name]) exMap[ex.name] = [];
      const best = ex.sets.reduce((b, set) => Math.max(b, set.weight || 0), 0);
      const totalReps = ex.sets.reduce((acc, set) => acc + (set.reps || 0), 0);
      exMap[ex.name].push({ date: s.dateISO, weight: best, reps: totalReps, label: s.date.split(',')[0] });
    });
  });

  const el = document.getElementById('progressList');
  if (Object.keys(exMap).length === 0) {
    el.innerHTML = `<div class="history-empty"><div class="icon">📈</div><p>Log sessions to see your progress here.</p></div>`;
    return;
  }

  el.innerHTML = Object.entries(exMap).map(([name, logs]) => {
    const reversed = [...logs].reverse();
    const maxW = Math.max(...reversed.map(l => l.weight), 1);
    const first = reversed[0]?.weight || 0;
    const last = reversed[reversed.length-1]?.weight || 0;
    const diff = last - first;
    const trendClass = diff > 0 ? 'up' : diff < 0 ? 'down' : '';
    const trendText = diff > 0 ? `▲ +${diff}kg` : diff < 0 ? `▼ ${diff}kg` : '→ No change';
    const bars = reversed.slice(-6);
    return `
    <div class="exercise-progress-card">
      <div class="ep-name">${name}</div>
      <div class="ep-graph">
        ${bars.map(b => {
          const h = maxW > 0 ? Math.max(Math.round(b.weight / maxW * 100), 4) : 4;
          return `<div class="ep-bar-wrap">
            <div class="ep-bar" style="height:${h}%"></div>
            <div class="ep-bar-label">${b.weight > 0 ? b.weight+'kg' : 'BW'}</div>
          </div>`;
        }).join('')}
      </div>
      <div class="ep-trend">Best: <b>${last}kg</b> &nbsp; Trend: <span class="${trendClass}">${trendText}</span></div>
    </div>`;
  }).join('');
}

// ─── EXPORT ──────────────────────────────────────────────────────────────────
function exportCSV() {
  const rows = [['Date', 'Day', 'Session', 'Exercise', 'Set', 'Weight (kg)', 'Reps', 'RPE']];
  sessions.forEach(s => {
    s.exercises.forEach(ex => {
      ex.sets.forEach((set, si) => {
        rows.push([s.date, s.day, s.label, ex.name, si+1, set.weight ?? '', set.reps ?? '', set.rpe ?? '']);
      });
    });
  });
  const csv = rows.map(r => r.map(c => `"${c}"`).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `gym_progression_${new Date().toISOString().split('T')[0]}.csv`;
  a.click();
}

// ─── VIEWS ───────────────────────────────────────────────────────────────────
function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('view-' + name)?.classList.add('active');
  event.target.classList.add('active');
  if (name === 'history') renderHistory();
  if (name === 'progress') renderProgress();
}

init();
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  });
}
</script>
